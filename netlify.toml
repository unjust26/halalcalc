[build]
  command = "rm -rf node_modules package-lock.json && npm install && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_CONVEX_URL = "https://acoustic-duck-75.convex.cloud"

# SPA routing — send all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
